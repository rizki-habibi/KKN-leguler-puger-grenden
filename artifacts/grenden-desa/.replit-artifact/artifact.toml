kind = "web"
previewPath = "/"
title = "Website Desa Grenden"
version = "1.0.0"
id = "artifacts/grenden-desa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21588

[services.development]
run = "pnpm --filter @workspace/grenden-desa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grenden-desa", "run", "build" ]
publicDir = "artifacts/grenden-desa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21588"
BASE_PATH = "/"
